<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>あつ森株価予想</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/gh/mikebryant/ac-nh-turnip-prices/js/predictions.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { kabu: '#61A056', 'kabu-light': '#8BCB7B', 'active-time': '#FEF08A' } } } }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
  <div class="container mx-auto px-4 py-8 max-w-7xl">
    <header class="text-center mb-10">
      <h1 class="text-3xl font-extrabold text-kabu flex items-center justify-center gap-2">あつ森株価予想</h1>
    </header>

    <main class="grid grid-cols-1 xl:grid-cols-3 xl:gap-8">
      <div class="xl:col-span-1 space-y-6">
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
          <h2 class="text-xl font-bold mb-5 flex items-center justify-between">
            <span>価格を入力</span>
            <span class="text-xs font-normal text-gray-500 bg-gray-100 px-2 py-1 rounded">黄色は現在時刻</span>
          </h2>
          <div class="space-y-4">
            <div class="bg-kabu/5 p-4 rounded-xl border border-kabu/20 space-y-3">
              <div>
                <label class="block text-sm font-semibold text-kabu mb-1">先週のパターン</label>
                <select id="previous_pattern" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-kabu/50 outline-none">
                  <option value="-1">わからない</option>
                  <option value="0">波型</option>
                  <option value="1">大跳ね型</option>
                  <option value="2">減少型</option>
                  <option value="3">小跳ね型</option>
                </select>
              </div>
              <label class="flex items-center gap-2 text-sm font-semibold text-gray-700">
                <input type="checkbox" id="first_buy" class="rounded text-kabu focus:ring-kabu h-4 w-4">
                今回が初めてのカブ購入
              </label>
            </div>

            <div class="p-4 rounded-xl border border-gray-200 transition-colors" id="container_buy">
              <label class="block text-sm font-semibold text-gray-700 mb-1">日曜の買値</label>
              <input type="number" id="buy" value="100" class="w-full px-4 py-2 border rounded-lg focus:ring-2 outline-none">
            </div>

            <div class="grid grid-cols-2 gap-3">
              <script>
                const days = [ { id: 'm', l: '月曜' }, { id: 'tu', l: '火曜' }, { id: 'w', l: '水曜' }, { id: 'th', l: '木曜' }, { id: 'f', l: '金曜' }, { id: 'sa', l: '土曜' } ];
                days.forEach(d => {
                  document.write(`
                    <div>
                      <label class="block text-xs font-medium text-gray-500 mb-1">${d.l}</label>
                      <div class="space-y-1">
                        <input type="number" id="${d.id}1" placeholder="AM" class="w-full px-2 py-1 border rounded outline-none text-sm transition-colors">
                        <input type="number" id="${d.id}2" placeholder="PM" class="w-full px-2 py-1 border rounded outline-none text-sm transition-colors">
                      </div>
                    </div>
                  `);
                });
              </script>
            </div>
          </div>
          
          <div class="flex gap-3 mt-6">
            <button id="predictBtn" class="flex-1 bg-kabu text-white font-bold py-3 rounded-xl shadow hover:bg-kabu-light transition">予測実行</button>
            <button id="shareBtn" class="flex-none bg-gray-200 text-gray-700 font-bold py-3 px-4 rounded-xl shadow hover:bg-gray-300 transition text-sm">共有リンク</button>
          </div>
        </section>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
          <h2 class="text-xl font-bold mb-4">推測されるパターン</h2>
          <pre id="result" class="bg-gray-50 p-4 rounded-xl text-sm font-mono whitespace-pre-wrap border border-gray-200">読み込み中...</pre>
        </section>
      </div>

      <div class="xl:col-span-2 space-y-6">
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
          <h2 class="text-xl font-bold mb-6">価格推移予測グラフ</h2>
          <div class="relative h-[300px] md:h-[400px]"><canvas id="priceChart"></canvas></div>
        </section>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
          <h2 class="text-xl font-bold mb-4">予測詳細テーブル</h2>
          <div class="overflow-x-auto">
            <table class="w-full text-sm text-center border-collapse">
              <thead>
                <tr class="bg-gray-100 border-b border-gray-200">
                  <th class="p-2 font-semibold text-gray-600">月</th><th class="p-2 font-semibold text-gray-600">火</th>
                  <th class="p-2 font-semibold text-gray-600">水</th><th class="p-2 font-semibold text-gray-600">木</th>
                  <th class="p-2 font-semibold text-gray-600">金</th><th class="p-2 font-semibold text-gray-600">土</th>
                </tr>
              </thead>
              <tbody id="priceTableBody" class="divide-y divide-gray-100">
                <tr><td colspan="6" class="p-4 text-gray-400">データがありません</td></tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <footer class="mt-12 mb-8 text-center text-gray-500 text-sm border-t border-gray-200 pt-8">
      <div class="mb-4">
        <p>Reference / Special Thanks:</p>
        <div class="flex justify-center gap-4 mt-2">
          <a href="https://gist.github.com/Treeki/85be14d297c80c8b3c0a76375743325b" target="_blank" rel="noopener noreferrer" class="text-kabu hover:underline">Treeki</a>
          <span class="text-gray-300">|</span>
          <a href="https://github.com/mikebryant/ac-nh-turnip-prices" target="_blank" rel="noopener noreferrer" class="text-kabu hover:underline">mikebryant</a>
        </div>
      </div>
      <p class="font-bold text-gray-600">&copy; 2026 あつ森株価予想</p>
    </footer>
  </div>

  <script>
    const patternNames = ["波型", "大跳ね型", "減少型", "小跳ね型"];
    const labels = ["月AM", "月PM", "火AM", "火PM", "水AM", "水PM", "木AM", "木PM", "金AM", "金PM", "土AM", "土PM"];
    const inputIds = ['m1','m2','tu1','tu2','w1','w2','th1','th2','f1','f2','sa1','sa2'];
    let chartInstance = null;

    function highlightCurrentTime() {
      const d = new Date();
      const day = d.getDay();
      const hour = d.getHours();
      document.getElementById('container_buy').classList.remove('bg-active-time', 'border-yellow-400');
      inputIds.forEach(id => document.getElementById(id).classList.remove('bg-active-time', 'border-yellow-400'));
      if (day === 0) {
        document.getElementById('container_buy').classList.add('bg-active-time', 'border-yellow-400');
      } else {
        const ampm = hour < 12 ? '1' : '2';
        const dayPrefix = ['m', 'tu', 'w', 'th', 'f', 'sa'][day - 1];
        const targetEl = document.getElementById(dayPrefix + ampm);
        if (targetEl) targetEl.classList.add('bg-active-time', 'border-yellow-400');
      }
    }

    function getACNHWeekId() {
      const d = new Date();
      d.setHours(d.getHours() - 5);
      const diff = d.getDate() - d.getDay();
      const sunday = new Date(d.setDate(diff));
      return `${sunday.getFullYear()}-${sunday.getMonth()}-${sunday.getDate()}`;
    }

    function getBestPattern(prices, isFirstBuy, prevPattern) {
      try {
        const predictor = new Predictor(prices, isFirstBuy, prevPattern);
        const possibilities = predictor.analyze_possibilities();
        if (possibilities.length === 0) return -1;
        let best = -1, maxProb = -1;
        possibilities.forEach(p => {
          if (p.category_total_probability > maxProb) { maxProb = p.category_total_probability; best = p.pattern_number; }
        });
        return best;
      } catch (e) { return -1; }
    }

    function saveState() {
      const state = {
        weekId: getACNHWeekId(),
        buy: parseInt(document.getElementById('buy').value, 10) || 100,
        sells: inputIds.map(id => document.getElementById(id).value),
        prev: parseInt(document.getElementById('previous_pattern').value, 10),
        first: document.getElementById('first_buy').checked
      };
      localStorage.setItem('turnip_state', JSON.stringify(state));
    }

    function applyUrlParams() {
      const params = new URLSearchParams(window.location.search);
      if (!params.has('b')) return false;

      if (params.has('pat')) document.getElementById('previous_pattern').value = params.get('pat');
      if (params.has('f')) document.getElementById('first_buy').checked = params.get('f') === '1';
      if (params.has('b')) document.getElementById('buy').value = params.get('b');
      
      if (params.has('p')) {
        const pArray = params.get('p').split(',');
        inputIds.forEach((id, i) => {
          document.getElementById(id).value = pArray[i] || '';
        });
      }
      return true;
    }

    function loadState() {
      highlightCurrentTime();
      if (applyUrlParams()) {
        runPrediction();
        return;
      }

      const saved = localStorage.getItem('turnip_state');
      const currentWeekId = getACNHWeekId();
      
      if (saved) {
        const state = JSON.parse(saved);
        if (state.weekId !== currentWeekId) {
          const numericSells = state.sells.map(v => parseInt(v, 10) || NaN);
          const oldPrices = [state.buy, state.buy, ...numericSells];
          const bestPattern = getBestPattern(oldPrices, state.first, state.prev);
          
          document.getElementById('previous_pattern').value = bestPattern;
          document.getElementById('first_buy').checked = false;
          document.getElementById('buy').value = 100;
          inputIds.forEach(id => document.getElementById(id).value = '');
          
          const pName = bestPattern >= 0 ? patternNames[bestPattern] : '不明';
          document.getElementById('result').textContent = `新しい週になりました。\n先週のデータから前回パターンを「${pName}」と設定しました。`;
          saveState();
        } else {
          document.getElementById('previous_pattern').value = state.prev;
          document.getElementById('first_buy').checked = state.first;
          document.getElementById('buy').value = state.buy || 100;
          inputIds.forEach((id, i) => document.getElementById(id).value = state.sells[i] || '');
          runPrediction();
        }
      } else {
        document.getElementById('result').textContent = "数値を入力して予測を実行してください。";
      }
    }

    function runPrediction() {
      const getVal = id => parseInt(document.getElementById(id).value, 10) || NaN;
      const buyPrice = getVal('buy');
      const sellPrices = inputIds.map(getVal);
      const prices = [buyPrice, buyPrice, ...sellPrices];
      const isFirstBuy = document.getElementById('first_buy').checked;
      const prevPattern = parseInt(document.getElementById('previous_pattern').value, 10);

      try {
        const predictor = new Predictor(prices, isFirstBuy, prevPattern);
        const possibilities = predictor.analyze_possibilities();

        let output = `抽出パターン: ${possibilities.length}件\n\n`;
        if (possibilities.length > 0) {
          possibilities.slice(0, 5).forEach((p, i) => {
            const prob = (p.category_total_probability * 100).toFixed(1);
            output += `候補${i+1}: ${patternNames[p.pattern_number]} (${prob}%) 最大${p.weekMax}ベル\n`;
          });
        } else {
          output = "該当パターンなし。入力値を確認してください。";
        }
        document.getElementById('result').textContent = output;

        const minPrices = Array(12).fill(999);
        const maxPrices = Array(12).fill(0);
        
        let bestPossibility = null;
        let highestProb = -1;

        possibilities.forEach(p => {
          // 最も確率の高い単一のパターン推移を抽出
          if (p.probability > highestProb) {
            highestProb = p.probability;
            bestPossibility = p;
          }
          // 最大・最小の抽出
          p.prices.slice(2).forEach((pr, i) => {
            if (pr.min < minPrices[i]) minPrices[i] = pr.min;
            if (pr.max > maxPrices[i]) maxPrices[i] = pr.max;
          });
        });

        // 最有力パターンの価格推移（平均値）を作成
        const likelyPrices = Array(12).fill(null);
        if (bestPossibility) {
          bestPossibility.prices.slice(2).forEach((pr, i) => {
            likelyPrices[i] = Math.floor((pr.min + pr.max) / 2);
          });
        }

        const ctx = document.getElementById('priceChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [
              { label: '最大予測', data: maxPrices, borderColor: '#61A056', backgroundColor: 'rgba(97, 160, 86, 0.1)', fill: 2, tension: 0.1, pointRadius: 3 },
              { label: '最有力推移 (中央値)', data: likelyPrices, borderColor: '#3B82F6', borderDash: [5, 5], fill: false, tension: 0.1, pointBackgroundColor: '#3B82F6', pointRadius: 4 },
              { label: '最小予測', data: minPrices, borderColor: '#EF4444', fill: false, tension: 0.1, pointRadius: 3 }
            ]
          },
          options: { responsive: true, maintainAspectRatio: false, scales: { y: { min: 0 } } }
        });

        const tbody = document.getElementById('priceTableBody');
        if (possibilities.length > 0) {
          let trAM = '<tr>';
          let trPM = '<tr class="bg-gray-50">';
          for (let i = 0; i < 6; i++) {
            const amMin = minPrices[i * 2] === 999 ? '-' : minPrices[i * 2];
            const amMax = maxPrices[i * 2] === 0 ? '-' : maxPrices[i * 2];
            const pmMin = minPrices[i * 2 + 1] === 999 ? '-' : minPrices[i * 2 + 1];
            const pmMax = maxPrices[i * 2 + 1] === 0 ? '-' : maxPrices[i * 2 + 1];
            trAM += `<td class="p-2 border-r border-gray-100 last:border-0"><div class="text-xs text-gray-400">AM</div><div class="font-medium">${amMin} ~ ${amMax}</div></td>`;
            trPM += `<td class="p-2 border-r border-gray-100 last:border-0"><div class="text-xs text-gray-400">PM</div><div class="font-medium text-gray-700">${pmMin} ~ ${pmMax}</div></td>`;
          }
          trAM += '</tr></tr>';
          tbody.innerHTML = trAM + trPM;
        } else {
          tbody.innerHTML = '<tr><td colspan="6" class="p-4 text-gray-400">データがありません</td></tr>';
        }
      } catch (e) {
        document.getElementById('result').textContent = "エラーが発生しました: " + e.message;
      }
    }

    document.getElementById('shareBtn').addEventListener('click', () => {
      const pat = document.getElementById('previous_pattern').value;
      const f = document.getElementById('first_buy').checked ? 1 : 0;
      const b = document.getElementById('buy').value;
      const p = inputIds.map(id => document.getElementById(id).value).join(',');
      
      const url = new URL(window.location.href.split('?')[0]);
      url.searchParams.set('pat', pat);
      url.searchParams.set('f', f);
      url.searchParams.set('b', b);
      url.searchParams.set('p', p);
      
      navigator.clipboard.writeText(url.toString()).then(() => {
        const btn = document.getElementById('shareBtn');
        const originalText = btn.textContent;
        btn.textContent = 'コピーしました！';
        btn.classList.replace('bg-gray-200', 'bg-kabu-light');
        btn.classList.replace('text-gray-700', 'text-white');
        setTimeout(() => {
          btn.textContent = originalText;
          btn.classList.replace('bg-kabu-light', 'bg-gray-200');
          btn.classList.replace('text-white', 'text-gray-700');
        }, 2000);
      });
    });

    document.querySelectorAll('input, select').forEach(el => {
      el.addEventListener('change', () => { saveState(); runPrediction(); });
    });
    document.getElementById('predictBtn').addEventListener('click', () => { saveState(); runPrediction(); });
    window.addEventListener('DOMContentLoaded', loadState);
  </script>
</body>
</html>
