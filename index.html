<body class="bg-nook-bg text-nook-brown font-maru">
  <div class="container mx-auto px-4 py-8 max-w-[1500px]">
    
    <header class="text-center mb-10">
      <h1 class="text-3xl md:text-4xl font-extrabold text-nook-leaf flex items-center justify-center drop-shadow-sm">

    <main class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-12 gap-6 xl:gap-8">
      
      <div class="xl:col-span-3 space-y-6">
        <section class="bg-nook-card p-6 md:p-7 rounded-[2rem] shadow-sm border-2 border-nook-light h-full">
          <h2 class="text-xl font-bold mb-5 flex items-center justify-between text-nook-brown">
            <span>価格を入力</span>
            <span class="text-[10px] sm:text-xs font-bold text-yellow-800 bg-yellow-100 px-3 py-1 rounded-full shadow-sm">黄色は現在時刻</span>

          <div class="space-y-5">

                <select id="previous_pattern" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-nook-green/50 focus:border-nook-green outline-none text-gray-700 bg-white shadow-inner transition">
                  <option value="-1">わからない</option>
                  <option value="0">波型</option>
                  <option value="1">大跳ね型</option>
                  <option value="2">減少型</option>
                  <option value="3">小跳ね型</option>
                </select>
              </div>
              <label class="flex items-center gap-2 text-sm font-bold text-gray-700 cursor-pointer pt-1">
                <input type="checkbox" id="first_buy" class="rounded text-nook-green focus:ring-nook-green h-5 w-5 border-gray-300">
                今回が初めてのカブ購入
              </label>
            </div>

            <div class="p-4 rounded-2xl border-2 border-transparent bg-gray-50 transition-colors duration-300" id="container_buy">
              <label class="block text-sm font-bold text-gray-700 mb-2">日曜の買値</label>
              <input type="number" id="buy" value="100" class="w-full px-4 py-2 border border-gray-200 rounded-xl focus:ring-2 focus:ring-nook-green/50 outline-none shadow-inner text-gray-700 text-lg font-bold">
            </div>

            <div class="grid grid-cols-2 gap-3">
              <div class="bg-white rounded-2xl border border-nook-light p-2 shadow-sm"><label class="block text-xs font-bold text-center text-nook-brown/70 mb-2">月曜</label><div class="space-y-1.5"><input type="number" id="m1" placeholder="AM" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-sm text-center text-gray-700 font-medium transition-colors duration-300 focus:border-nook-green focus:ring-1 focus:ring-nook-green"><input type="number" id="m2" placeholder="PM" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-sm text-center text-gray-700 font-medium transition-colors duration-300 focus:border-nook-green focus:ring-1 focus:ring-nook-green"></div></div>
              <div class="bg-white rounded-2xl border border-nook-light p-2 shadow-sm"><label class="block text-xs font-bold text-center text-nook-brown/70 mb-2">火曜</label><div class="space-y-1.5"><input type="number" id="tu1" placeholder="AM" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-sm text-center text-gray-700 font-medium transition-colors duration-300 focus:border-nook-green focus:ring-1 focus:ring-nook-green"><input type="number" id="tu2" placeholder="PM" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-sm text-center text-gray-700 font-medium transition-colors duration-300 focus:border-nook-green focus:ring-1 focus:ring-nook-green"></div></div>
              <div class="bg-white rounded-2xl border border-nook-light p-2 shadow-sm"><label class="block text-xs font-bold text-center text-nook-brown/70 mb-2">水曜</label><div class="space-y-1.5"><input type="number" id="w1" placeholder="AM" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-sm text-center text-gray-700 font-medium transition-colors duration-300 focus:border-nook-green focus:ring-1 focus:ring-nook-green"><input type="number" id="w2" placeholder="PM" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-sm text-center text-gray-700 font-medium transition-colors duration-300 focus:border-nook-green focus:ring-1 focus:ring-nook-green"></div></div>
              <div class="bg-white rounded-2xl border border-nook-light p-2 shadow-sm"><label class="block text-xs font-bold text-center text-nook-brown/70 mb-2">木曜</label><div class="space-y-1.5"><input type="number" id="th1" placeholder="AM" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-sm text-center text-gray-700 font-medium transition-colors duration-300 focus:border-nook-green focus:ring-1 focus:ring-nook-green"><input type="number" id="th2" placeholder="PM" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-sm text-center text-gray-700 font-medium transition-colors duration-300 focus:border-nook-green focus:ring-1 focus:ring-nook-green"></div></div>
              <div class="bg-white rounded-2xl border border-nook-light p-2 shadow-sm"><label class="block text-xs font-bold text-center text-nook-brown/70 mb-2">金曜</label><div class="space-y-1.5"><input type="number" id="f1" placeholder="AM" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-sm text-center text-gray-700 font-medium transition-colors duration-300 focus:border-nook-green focus:ring-1 focus:ring-nook-green"><input type="number" id="f2" placeholder="PM" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-sm text-center text-gray-700 font-medium transition-colors duration-300 focus:border-nook-green focus:ring-1 focus:ring-nook-green"></div></div>
              <div class="bg-white rounded-2xl border border-nook-light p-2 shadow-sm"><label class="block text-xs font-bold text-center text-nook-brown/70 mb-2">土曜</label><div class="space-y-1.5"><input type="number" id="sa1" placeholder="AM" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-sm text-center text-gray-700 font-medium transition-colors duration-300 focus:border-nook-green focus:ring-1 focus:ring-nook-green"><input type="number" id="sa2" placeholder="PM" class="w-full px-2 py-1.5 border border-gray-200 rounded-lg outline-none text-sm text-center text-gray-700 font-medium transition-colors duration-300 focus:border-nook-green focus:ring-1 focus:ring-nook-green"></div></div>
            </div>
          </div>
          
          <div class="flex gap-3 mt-7">
            <button id="predictBtn" class="flex-1 bg-nook-green text-white font-bold py-3.5 rounded-2xl shadow-md hover:bg-nook-leaf hover:-translate-y-0.5 transform transition duration-200 text-lg">予測実行</button>
            <button id="shareBtn" class="flex-none bg-white border-2 border-nook-green text-nook-leaf font-bold py-3.5 px-4 rounded-2xl shadow-sm hover:bg-nook-bg transition duration-200 text-sm flex items-center justify-center">共有</button>
          </div>
        </section>
      </div>

      <div class="xl:col-span-6 space-y-6">
        <section class="bg-nook-card p-6 md:p-7 rounded-[2rem] shadow-sm border-2 border-nook-light">
          <h2 class="text-xl font-bold mb-6 text-nook-brown">価格推移予測グラフ</h2>
          <div class="relative h-[300px] md:h-[400px]"><canvas id="priceChart"></canvas></div>
        </section>

        <section class="bg-nook-card p-6 md:p-7 rounded-[2rem] shadow-sm border-2 border-nook-light">
          <h2 class="text-xl font-bold mb-5 text-nook-brown">予測詳細テーブル</h2>
          <div class="overflow-x-auto rounded-xl border border-nook-light">
            <table class="w-full text-sm text-center border-collapse">
              <thead>
                <tr class="bg-nook-bg border-b border-nook-light">
                  <th class="p-3 font-bold text-nook-brown">月</th><th class="p-3 font-bold text-nook-brown">火</th>
                  <th class="p-3 font-bold text-nook-brown">水</th><th class="p-3 font-bold text-nook-brown">木</th>
                  <th class="p-3 font-bold text-nook-brown">金</th><th class="p-3 font-bold text-nook-brown">土</th>
                </tr>
              </thead>
              <tbody id="priceTableBody" class="divide-y divide-gray-100 bg-white">
                <tr><td colspan="6" class="p-6 text-gray-400">データがありません</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <div id="detailSection" style="display: none;">
          <div id="detailResult"></div>
        </div>
      </div>

      <div class="xl:col-span-3 space-y-6">
        <section class="bg-nook-card p-6 md:p-7 rounded-[2rem] shadow-sm border-2 border-nook-light h-full">
          <h2 class="text-xl font-bold mb-5 text-nook-brown">推測されるパターン</h2>
          <div id="futureBanner" style="display: none;" class="mb-6 p-4 rounded-2xl border-2 shadow-sm transition-all duration-300"></div>
          <div id="result">
            <div class="text-gray-400 p-4 text-center text-sm bg-gray-50 rounded-xl border border-gray-100">読み込み中...</div>
          </div>
        </section>
      </div>

    </main>

    <footer class="mt-16 mb-8 text-center text-nook-brown/60 text-sm pt-8 border-t-2 border-nook-light/50">
      <div class="mb-4">
        <p class="font-bold">Reference / Special Thanks:</p>
        <div class="flex justify-center gap-4 mt-2">
          <a href="https://gist.github.com/Treeki/85be14d297c80c8b3c0a76375743325b" target="_blank" rel="noopener noreferrer" class="hover:text-nook-leaf transition">Treeki</a>
          <span class="text-gray-300">|</span>
          <a href="https://github.com/mikebryant/ac-nh-turnip-prices" target="_blank" rel="noopener noreferrer" class="hover:text-nook-leaf transition">mikebryant</a>
        </div>
      </div>
      <p class="font-extrabold">&copy; 2026 あつ森株価予想</p>
    </footer>
  </div>

  <script>
    const patternNames = ["波型", "大跳ね型", "減少型", "小跳ね型"];
    const labels = ["月AM", "月PM", "火AM", "火PM", "水AM", "水PM", "木AM", "木PM", "金AM", "金PM", "土AM", "土PM"];
    const inputIds = ['m1','m2','tu1','tu2','w1','w2','th1','th2','f1','f2','sa1','sa2'];
    let chartInstance = null;

    function highlightCurrentTime() {
      const d = new Date();
      const day = d.getDay();
      const hour = d.getHours();
      
      const buyEl = document.getElementById('container_buy');
      if(buyEl) buyEl.classList.remove('bg-yellow-100', 'border-yellow-400');
      
      inputIds.forEach(id => {
        const el = document.getElementById(id);
        if(el) el.classList.remove('bg-yellow-100', 'border-yellow-400');
      });
      
      if (day === 0) {
        if(buyEl) buyEl.classList.add('bg-yellow-100', 'border-yellow-400');
      } else {
        const ampm = hour < 12 ? '1' : '2';
        const dayPrefix = ['m', 'tu', 'w', 'th', 'f', 'sa'][day - 1];
        const targetEl = document.getElementById(dayPrefix + ampm);
        if (targetEl) targetEl.classList.add('bg-yellow-100', 'border-yellow-400');
      }
    }

    function getACNHWeekId() {
      const d = new Date();
      d.setHours(d.getHours() - 5);
      const diff = d.getDate() - d.getDay();
      const sunday = new Date(d.setDate(diff));
      return `${sunday.getFullYear()}-${sunday.getMonth()}-${sunday.getDate()}`;
    }

    function getBestPattern(prices, isFirstBuy, prevPattern) {
      try {
        const predictor = new Predictor(prices, isFirstBuy, prevPattern);
        const rawPossibilities = predictor.analyze_possibilities();
        const possibilities = rawPossibilities.filter(p => typeof p.pattern_number === 'number' && p.pattern_number >= 0 && p.pattern_number <= 3);
        
        if (possibilities.length === 0) return -1;
        let best = -1, maxProb = -1;
        possibilities.forEach(p => {
          if (p.category_total_probability > maxProb) { maxProb = p.category_total_probability; best = p.pattern_number; }
        });
        return best;
      } catch (e) { return -1; }
    }

    function saveState() {
      try {
        const state = {
          weekId: getACNHWeekId(),
          buy: parseInt(document.getElementById('buy').value, 10) || 100,
          sells: inputIds.map(id => {
            const el = document.getElementById(id);
            return el ? el.value : '';
          }),
          prev: parseInt(document.getElementById('previous_pattern').value, 10),
          first: document.getElementById('first_buy').checked
        };
        localStorage.setItem('turnip_state', JSON.stringify(state));
      } catch (e) {
        console.warn("localStorage could not be accessed.");
      }
    }

    function applyUrlParams() {
      const params = new URLSearchParams(window.location.search);
      if (!params.has('b')) return false;
      if (params.has('pat')) document.getElementById('previous_pattern').value = params.get('pat');
      if (params.has('f')) document.getElementById('first_buy').checked = params.get('f') === '1';
      if (params.has('b')) document.getElementById('buy').value = params.get('b');
      if (params.has('p')) {
        const pArray = params.get('p').split(',');
        inputIds.forEach((id, i) => { 
          const el = document.getElementById(id);
          if(el) el.value = pArray[i] || ''; 
        });
      }
      return true;
    }

    function loadState() {
      try { highlightCurrentTime(); } catch(e) {}
      if (applyUrlParams()) { runPrediction(); return; }
      
      let saved = null;
      try { saved = localStorage.getItem('turnip_state'); } catch(e) {}
      
      const currentWeekId = getACNHWeekId();
      
      if (saved) {
        try {
          const state = JSON.parse(saved);
          if (state.weekId !== currentWeekId) {
            const numericSells = state.sells.map(v => parseInt(v, 10) || NaN);
            const oldPrices = [state.buy, state.buy, ...numericSells];
            const bestPattern = getBestPattern(oldPrices, state.first, state.prev);
            
            document.getElementById('previous_pattern').value = bestPattern;
            document.getElementById('first_buy').checked = false;
            document.getElementById('buy').value = 100;
            inputIds.forEach(id => {
              const el = document.getElementById(id);
              if(el) el.value = '';
            });
            
            const pName = bestPattern >= 0 ? patternNames[bestPattern] : '不明';
            document.getElementById('result').innerHTML = `<div class="bg-blue-50 text-blue-800 p-4 rounded-xl border border-blue-100 text-sm shadow-sm">新しい週になりました。<br>先週のデータから前回パターンを「<b class="text-base">${pName}</b>」に自動設定しました。数値を入力してください。</div>`;
            const detailSec = document.getElementById('detailSection');
            if(detailSec) detailSec.style.display = 'none';
            saveState();
          } else {
            document.getElementById('previous_pattern').value = state.prev;
            document.getElementById('first_buy').checked = state.first;
            document.getElementById('buy').value = state.buy || 100;
            inputIds.forEach((id, i) => {
              const el = document.getElementById(id);
              if(el) el.value = state.sells[i] || '';
            });
            runPrediction();
          }
        } catch(e) {
          runPrediction();
        }
      } else {
        document.getElementById('result').innerHTML = `<div class="text-gray-400 p-4 text-center text-sm bg-gray-50 rounded-xl border border-gray-100">数値を入力して<br>予測を実行してください</div>`;
        const detailSec = document.getElementById('detailSection');
        if(detailSec) detailSec.style.display = 'none';
      }
    }

    function runPrediction() {
      try {
        if (typeof Predictor === 'undefined') {
          throw new Error("予測エンジンの読み込みに失敗しました。ページをリロードしてください。");
        }

        const getVal = id => {
          const el = document.getElementById(id);
          return el ? (parseInt(el.value, 10) || NaN) : NaN;
        };

        const buyPriceVal = getVal('buy');
        const basePrice = isNaN(buyPriceVal) ? 100 : buyPriceVal;
        const sellPrices = inputIds.map(getVal);
        const prices = [buyPriceVal, buyPriceVal, ...sellPrices];
        
        const firstBuyEl = document.getElementById('first_buy');
        const isFirstBuy = firstBuyEl ? firstBuyEl.checked : false;
        
        const prevPatEl = document.getElementById('previous_pattern');
        const prevPattern = prevPatEl ? parseInt(prevPatEl.value, 10) : -1;

        const predictor = new Predictor(prices, isFirstBuy, prevPattern);
        const rawPossibilities = predictor.analyze_possibilities();
        
        // ★ バグ修正: 無効なダミーデータ（undefined等）を完全に除外して純粋な予測だけを残す
        const possibilities = rawPossibilities.filter(p => typeof p.pattern_number === 'number' && p.pattern_number >= 0 && p.pattern_number <= 3);

        let totalProb = 0;
        let futureSpikeProb = 0;
        let peakTimeProb = Array(14).fill(0);
        
        let lastInputIndex = 1;
        inputIds.forEach((id, idx) => {
          if (!isNaN(getVal(id))) lastInputIndex = idx + 2;
        });

        const actualPricesData = sellPrices.map(val => isNaN(val) ? null : val);
        let lastActualVal = NaN;
        let lastActualIdx = -1;
        for (let i = 11; i >= 0; i--) {
          if (actualPricesData[i] !== null) {
            lastActualVal = actualPricesData[i];
            lastActualIdx = i;
            break;
          }
        }

        const minPrices = Array(12).fill(999);
        const maxPrices = Array(12).fill(0);
        const expectedPrices = Array(12).fill(0);

        const groupStats = [
          { name: "波型", prob: 0, max: 0 },
          { name: "大跳ね型", prob: 0, max: 0 },
          { name: "減少型", prob: 0, max: 0 },
          { name: "小跳ね型", prob: 0, max: 0 }
        ];

        if (possibilities.length > 0) {
          possibilities.forEach(p => {
            const probWeight = (typeof p.probability === 'number' && !isNaN(p.probability)) ? p.probability : 1;
            totalProb += probWeight;
            
            let pNum = p.pattern_number;
            groupStats[pNum].prob += probWeight;
            
            let pWeekMax = 0;
            p.prices.slice(2).forEach((pr, i) => {
              if (pr.max > pWeekMax) pWeekMax = pr.max;
              if (pr.min < minPrices[i]) minPrices[i] = pr.min;
              if (pr.max > maxPrices[i]) maxPrices[i] = pr.max;
            });
            if (pWeekMax > groupStats[pNum].max) {
              groupStats[pNum].max = pWeekMax;
            }
            
            let peakIdx = 2;
            let peakAvg = 0;
            for (let i = 2; i <= 13; i++) {
              let avg = (p.prices[i].min + p.prices[i].max) / 2;
              if (avg > peakAvg) { peakAvg = avg; peakIdx = i; }
            }
            if (peakIdx > lastInputIndex && p.prices[peakIdx].max > basePrice) {
              futureSpikeProb += probWeight;
            }
            peakTimeProb[peakIdx] += probWeight;
          });

          if (totalProb > 0) {
            possibilities.forEach(p => {
              const probWeight = (typeof p.probability === 'number' && !isNaN(p.probability)) ? p.probability : 1;
              p.prices.slice(2).forEach((pr, i) => {
                expectedPrices[i] += ((pr.min + pr.max) / 2) * (probWeight / totalProb);
              });
            });
            for (let i = 0; i < 12; i++) expectedPrices[i] = Math.round(expectedPrices[i]);
          }

          const validPatterns = groupStats
            .filter(g => g.prob > 0)
            .map(g => ({
              name: g.name,
              percent: totalProb > 0 ? (g.prob / totalProb) * 100 : 0,
              max: g.max
            }))
            .sort((a, b) => b.percent - a.percent);

          // 【右カラム用】大まかな予測パターンの描画
          let outputHtml = `<div class="space-y-3">`;
          validPatterns.forEach(vp => {
            outputHtml += `
              <div class="bg-nook-bg border border-nook-light p-4 rounded-2xl flex flex-col gap-1.5 shadow-sm">
                <div class="flex justify-between items-center">
                  <span class="font-extrabold text-gray-700 text-base">${vp.name}</span>
                  <span class="text-nook-leaf font-extrabold text-xl">${vp.percent.toFixed(1)}%</span>
                </div>
                <div class="text-xs text-gray-500 text-right mt-1">
                  最大予測: <span class="font-bold text-gray-800 text-sm ml-1">${vp.max}</span> ベル
                </div>
              </div>
            `;
          });
          outputHtml += `</div>`;
          document.getElementById('result').innerHTML = outputHtml;

          // 【中央カラム用】詳細な抽出データのアコーディオン
          const sortedPossibilities = [...possibilities].sort((a, b) => {
             const probA = (typeof a.probability === 'number' && !isNaN(a.probability)) ? a.probability : 1;
             const probB = (typeof b.probability === 'number' && !isNaN(b.probability)) ? b.probability : 1;
             return probB - probA;
          });

          let detailHtml = `
            <details class="group bg-white border-2 border-nook-light rounded-[2rem] shadow-sm transition-all duration-300 text-sm overflow-hidden">
              <summary class="p-6 md:p-7 cursor-pointer font-bold text-nook-brown flex items-center justify-between outline-none hover:bg-nook-bg transition-colors">
                <div class="flex items-center gap-2 text-lg">
                  <span>🔍</span> 詳細データを見る (${possibilities.length}件)
                </div>
                <span class="transition duration-300 group-open:-rotate-180 text-nook-leaf">
                  <svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" viewBox="0 0 24 24" width="24"><path d="M6 9l6 6 6-6"></path></svg>
                </span>
              </summary>
              <div class="p-6 md:p-7 pt-2 text-sm text-gray-600 max-h-[600px] overflow-y-auto space-y-5 border-t-2 border-nook-light/50 bg-nook-bg/30">
          `;
          
          sortedPossibilities.forEach((p, i) => {
            const probWeight = (typeof p.probability === 'number' && !isNaN(p.probability)) ? p.probability : 1;
            const probPercent = totalProb > 0 ? ((probWeight / totalProb) * 100).toFixed(1) : 0;
            let pNum = p.pattern_number;
            let pName = patternNames[pNum];
            
            let daysHtml = '';
            const dayNames = ['月', '火', '水', '木', '金', '土'];
            
            for(let d=0; d<6; d++) {
                let am = p.prices[2 + d*2];
                let pm = p.prices[3 + d*2];
                let amText = am.min === am.max ? am.min : `${am.min}~${am.max}`;
                let pmText = pm.min === pm.max ? pm.min : `${pm.min}~${pm.max}`;
                
                daysHtml += `
                  <div class="bg-white rounded-xl flex flex-col justify-center py-2 border border-nook-light/80 shadow-sm">
                    <span class="text-xs text-gray-400 font-bold mb-1">${dayNames[d]}</span>
                    <span class="text-[13px] text-gray-700 font-bold leading-tight">${amText}</span>
                    <span class="text-[13px] text-gray-700 font-bold leading-tight">${pmText}</span>
                  </div>
                `;
            }

            detailHtml += `
              <div class="bg-white p-4 rounded-2xl border border-nook-light shadow-sm">
                <div class="flex justify-between items-center mb-3">
                  <span class="font-bold text-gray-700 text-base">${i+1}. ${pName} <span class="text-gray-400 font-normal ml-2 text-xs">(最大${p.weekMax})</span></span>
                  <span class="font-extrabold text-nook-leaf text-base">${probPercent}%</span>
                </div>
                <div class="grid grid-cols-6 gap-2 text-center">
                  ${daysHtml}
                </div>
              </div>
            `;
          });
          detailHtml += `</div></details>`;
          
          document.getElementById('detailResult').innerHTML = detailHtml;
          document.getElementById('detailSection').style.display = 'block';

        } else {
          document.getElementById('result').innerHTML = `<div class="text-red-500 bg-red-50 p-4 rounded-xl border border-red-200 text-sm text-center font-bold">該当パターンがありません。<br>入力値を確認してください。</div>`;
          document.getElementById('detailSection').style.display = 'none';
        }
        
        const banner = document.getElementById('futureBanner');
        if (totalProb > 0) {
          let increasePercent = ((futureSpikeProb / totalProb) * 100).toFixed(1);
          let bestPeakIdx = 2;
          let maxPeakProb = -1;
          for (let i = 2; i <= 13; i++) {
            if (peakTimeProb[i] > maxPeakProb) { maxPeakProb = peakTimeProb[i]; bestPeakIdx = i; }
          }
          let peakLabel = labels[bestPeakIdx - 2];

          banner.className = "mb-6 p-4 rounded-2xl border-2 shadow-sm transition-all duration-300"; 
          
          if (increasePercent >= 50) {
            banner.classList.add('bg-green-50', 'border-nook-green', 'text-green-800');
            banner.innerHTML = `<div class="font-extrabold text-lg flex items-center gap-2 text-nook-leaf"><span>📈</span> 値上がり確率: ${increasePercent}%</div><div class="text-sm mt-2 font-medium text-gray-600">最高値の予定日時: <span class="font-bold text-sm bg-white px-3 py-1 rounded-full border border-green-200 ml-1 shadow-sm">${peakLabel}</span></div>`;
          } else if (increasePercent > 0) {
            banner.classList.add('bg-yellow-50', 'border-yellow-300', 'text-yellow-800');
            banner.innerHTML = `<div class="font-extrabold text-lg flex items-center gap-2 text-yellow-700"><span>🤔</span> 値上がり確率: ${increasePercent}%</div><div class="text-sm mt-2 font-medium text-gray-600">最高値の予定日時: <span class="font-bold text-sm bg-white px-3 py-1 rounded-full border border-yellow-200 ml-1 shadow-sm">${peakLabel}</span></div>`;
          } else {
            if (!isNaN(lastActualVal) && lastActualVal > basePrice) {
              banner.classList.add('bg-blue-50', 'border-blue-300', 'text-blue-800');
              banner.innerHTML = `<div class="font-extrabold text-lg flex items-center gap-2 text-blue-700"><span>🚨</span> 今が売り時です！</div><div class="text-sm mt-2 text-gray-600 font-medium leading-relaxed">これ以上の値上がりは見込めません。現在の価格で直ちに利益を確定させることを強く推奨します。</div>`;
            } else {
              banner.classList.add('bg-red-50', 'border-red-200', 'text-red-800');
              banner.innerHTML = `<div class="font-extrabold text-lg flex items-center gap-2 text-red-600"><span>📉</span> 値上がり確率: 0%</div><div class="text-sm mt-2 text-gray-600 font-medium leading-relaxed">これ以上の値上がりは見込めません。損切りするか、他プレイヤーの島を頼ることを推奨します。</div>`;
            }
          }
          banner.style.display = 'block';
        } else {
          banner.style.display = 'none';
        }

        for (let i = 0; i < lastActualIdx; i++) {
          maxPrices[i] = null;
          expectedPrices[i] = null;
          minPrices[i] = null;
        }

        const ctx = document.getElementById('priceChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        
        Chart.defaults.font.family = '"Hiragino Maru Gothic ProN", "Rounded M+ 1c", sans-serif';
        Chart.defaults.color = '#7A5C43';

        chartInstance = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [
              { label: '最大予測', data: maxPrices, borderColor: '#5D9B55', backgroundColor: 'rgba(93, 155, 85, 0.1)', fill: 2, tension: 0.2, pointRadius: 3, borderWidth: 2, order: 3 },
              { label: '期待値推移', data: expectedPrices, borderColor: '#3B82F6', borderDash: [6, 4], fill: false, tension: 0.2, pointBackgroundColor: '#3B82F6', pointRadius: 4, borderWidth: 2, order: 2 },
              { label: '最小予測', data: minPrices, borderColor: '#EF4444', fill: false, tension: 0.2, pointRadius: 3, borderWidth: 2, order: 4 },
              { label: '実測値', data: actualPricesData, borderColor: '#4B5563', backgroundColor: '#4B5563', fill: false, tension: 0, pointRadius: 5, pointBackgroundColor: '#F59E0B', borderWidth: 3, spanGaps: true, order: 1 }
            ]
          },
          options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            scales: { y: { min: 0, grid: { color: '#E5E7EB' } }, x: { grid: { display: false } } },
            plugins: { legend: { labels: { font: { weight: 'bold' } } } }
          }
        });

        const tbody = document.getElementById('priceTableBody');
        if (possibilities.length > 0) {
          let trAM = '<tr class="bg-white">'; 
          let trPM = '<tr class="bg-nook-bg/30">';
          for (let i = 0; i < 6; i++) {
            
            const amInputEl = document.getElementById(inputIds[i * 2]);
            const amInputVal = amInputEl ? parseInt(amInputEl.value, 10) : NaN;
            let amText = '';
            
            if (!isNaN(amInputVal)) {
              amText = amInputVal;
            } else {
              let amMin = minPrices[i * 2];
              let amMax = maxPrices[i * 2];
              
              if (amMin === 999 || amMin === null || amMin === undefined) amMin = '-';
              if (amMax === 0 || amMax === null || amMax === undefined) amMax = '-';
              
              if (amMin === '-' && amMax === '-') {
                amText = '<span class="text-gray-300">-</span>';
              } else {
                amText = `${amMin} <span class="text-gray-300 font-normal mx-0.5">~</span> ${amMax}`;
              }
            }

            const pmInputEl = document.getElementById(inputIds[i * 2 + 1]);
            const pmInputVal = pmInputEl ? parseInt(pmInputEl.value, 10) : NaN;
            let pmText = '';
            
            if (!isNaN(pmInputVal)) {
              pmText = pmInputVal;
            } else {
              let pmMin = minPrices[i * 2 + 1];
              let pmMax = maxPrices[i * 2 + 1];
              
              if (pmMin === 999 || pmMin === null || pmMin === undefined) pmMin = '-';
              if (pmMax === 0 || pmMax === null || pmMax === undefined) pmMax = '-';
              
              if (pmMin === '-' && pmMax === '-') {
                pmText = '<span class="text-gray-300">-</span>';
              } else {
                pmText = `${pmMin} <span class="text-gray-300 font-normal mx-0.5">~</span> ${pmMax}`;
              }
            }
            
            trAM += `<td class="p-3 border-r border-nook-light last:border-0"><div class="text-[11px] font-bold text-gray-400 mb-1">AM</div><div class="font-extrabold text-gray-700">${amText}</div></td>`;
            trPM += `<td class="p-3 border-r border-nook-light last:border-0"><div class="text-[11px] font-bold text-gray-400 mb-1">PM</div><div class="font-extrabold text-gray-700">${pmText}</div></td>`;
          }
          trAM += '</tr>'; trPM += '</tr>'; 
          tbody.innerHTML = trAM + trPM;
        } else {
          tbody.innerHTML = '<tr><td colspan="6" class="p-6 text-gray-400">データがありません</td></tr>';
        }
      } catch (e) {
        document.getElementById('result').innerHTML = `<div class="text-red-500 bg-red-50 p-4 rounded-xl border border-red-200 text-sm font-bold shadow-sm">処理エラー: ${e.message}</div>`;
        const detailSec = document.getElementById('detailSection');
        if(detailSec) detailSec.style.display = 'none';
      }
    }

    document.getElementById('shareBtn').addEventListener('click', () => {
      const pat = document.getElementById('previous_pattern').value;
      const f = document.getElementById('first_buy').checked ? 1 : 0;
      const b = document.getElementById('buy').value;
      const p = inputIds.map(id => {
        const el = document.getElementById(id);
        return el ? el.value : '';
      }).join(',');
      
      const url = new URL(window.location.href.split('?')[0]);
      url.searchParams.set('pat', pat); url.searchParams.set('f', f);
      url.searchParams.set('b', b); url.searchParams.set('p', p);
      
      navigator.clipboard.writeText(url.toString()).then(() => {
        const btn = document.getElementById('shareBtn');
        const originalText = btn.textContent;
        btn.textContent = 'コピー完了!';
        btn.classList.replace('bg-white', 'bg-nook-green'); 
        btn.classList.replace('text-nook-leaf', 'text-white');
        setTimeout(() => {
          btn.textContent = originalText;
          btn.classList.replace('bg-nook-green', 'bg-white'); 
          btn.classList.replace('text-white', 'text-nook-leaf');
        }, 2000);
      });
    });

    document.querySelectorAll('input, select').forEach(el => {
      el.addEventListener('change', () => { saveState(); runPrediction(); });
    });
    document.getElementById('predictBtn').addEventListener('click', () => { saveState(); runPrediction(); });
    window.addEventListener('DOMContentLoaded', loadState);
  </script>
</body>
</html>
